<!DOCTYPE html><html lang="pt"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no"><title>Festa Junina</title><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:system-ui;background:#0a0500;color:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;text-align:center;padding:20px;gap:20px}h1{color:#fc0;font-size:1.4rem}p{color:#ccc;font-size:.9rem;max-width:300px}.btn{display:inline-block;background:#d03080;color:#fff;padding:16px 36px;border-radius:12px;text-decoration:none;font-weight:bold;font-size:1.1rem;box-shadow:0 4px 0 #8a1050;cursor:pointer;border:none}.btn:active{transform:scale(.96)}small{color:#888;font-size:.7rem;margin-top:4px}.err{color:#f66;font-size:.8rem;display:none;margin-top:8px}</style></head><body><h1>🎉 Festa Junina</h1><p>Toque no botão para abrir<br>o Instagram Stories com a moldura</p><button class="btn" id="b">📸 Abrir Instagram</button><small>Depois tire sua foto e posicione a moldura!</small><p class="err" id="e">Instagram não abriu?<br><a href="https://instagram.com" style="color:#fc0">Abra o Instagram manualmente</a><br>e adicione a moldura como sticker.</p><script>
const U='instagram-stories://share?com.instagram.sharedSticker.stickerImage=https://files.catbox.moe/yrpbp2.png';
document.getElementById('b').addEventListener('click',function(){
  var w=window.open(U,'_blank');
  setTimeout(function(){
    if(!w||w.closed||document.hidden)return;
    if(/Android/i.test(navigator.userAgent)){
      window.location='intent://share?com.instagram.sharedSticker.stickerImage='+encodeURIComponent('https://files.catbox.moe/yrpbp2.png')+'#Intent;package=com.instagram.android;scheme=https;end';
    }
    document.getElementById('e').style.display='block';
  },2500);
});
</script></body></html>
