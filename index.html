<!DOCTYPE html><html lang="pt"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no"><link rel="preload" as="image" href="output.png"><title>Moldura Festa Junina</title><style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:system-ui,-apple-system,sans-serif;
  background:#0a0400;
  color:#fff;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  min-height:100vh;text-align:center;padding:40px 20px;
  gap:20px;
}
.estrela{
  display:flex;gap:16px;
  font-size:14px;color:#fc0;opacity:.5;
  letter-spacing:8px;
}
h1{
  font-size:2.2rem;font-weight:800;
  color:#fc0;
  text-shadow:0 2px 0 #a65e00;
}
.line{width:50px;height:2px;background:#fc0;opacity:.4;border-radius:1px}
.sub{color:#cdc;font-size:.9rem;line-height:1.6}

.btn{
  display:inline-block;
  background:#25a045;
  color:#fff;padding:14px 48px;border-radius:50px;
  text-decoration:none;font-weight:700;font-size:1rem;
  letter-spacing:.5px;
  box-shadow:0 4px 0 #155c29;
  transition:transform .1s;
}
.btn:active{transform:scale(.96)}

.steps{
  text-align:left;
  background:#120c04;
  border:1px solid #fc02;
  border-radius:16px;padding:20px 28px;max-width:330px;
  font-size:.82rem;line-height:2.3;
}
.steps li{color:#ddd;list-style:none}
.steps li b{color:#fc0}
.steps li::before{
  content:'';display:inline-block;
  width:7px;height:7px;border-radius:50%;
  margin-right:10px;vertical-align:middle;
}
.steps li:nth-child(1)::before{background:#ff6b6b}
.steps li:nth-child(2)::before{background:#ffd93d}
.steps li:nth-child(3)::before{background:#6bcb77}
.steps li:nth-child(4)::before{background:#4d96ff}
.steps li:nth-child(5)::before{background:#cc4de0}

footer{
  margin-top:8px;opacity:.35;
  font-size:.7rem;letter-spacing:1px;
}
.preview{display:flex;justify-content:center}.preview img{max-width:130px;height:auto}</style></head><body>

<div class="estrela">✦ &bull; ✦ &bull; ✦</div>

<h1>Festa Junina</h1>

<div class="line"></div>

<p class="sub">Baixe a moldura transparente<br>e use como sticker nos Stories</p>

<div class="preview"><img src="thumb.png" alt="Moldura" style="width:120px;border-radius:12px;box-shadow:0 4px 16px #0006;margin-bottom:16px"></div><a class="btn" href="output.png" download>BAIXAR MOLDURA</a>

<ol class="steps">
  <li>Abra o <b>Instagram</b></li>
  <li>Crie um Story com sua <b>foto</b></li>
  <li>Toque em <b>Figurinhas</b></li>
  <li>Toque em <b>Foto</b> e escolha a moldura</li>
  <li><b>Posicione</b> e publique</li>
</ol>

<footer>tinyurl.com/fj-mold</footer>

</body></html>
