<!DOCTYPE html><html lang="pt"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no"><title>Moldura Festa Junina</title><style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:system-ui,-apple-system,sans-serif;
  background:#0a0500;
  color:#fff;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  min-height:100vh;text-align:center;padding:28px 20px;gap:24px;
  position:relative;overflow:hidden;
}
body::before{
  content:'';position:absolute;top:0;left:0;width:100%;height:100%;
  background:
    radial-gradient(circle at 80% 20%,#fc05,0%,transparent 40%),
    radial-gradient(circle at 20% 80%,#f805,0%,transparent 40%),
    radial-gradient(circle at 50% 50%,#ff05,0%,transparent 50%);
  pointer-events:none;
}
.bandeirinhas{
  font-size:2rem;letter-spacing:6px;opacity:.6;
}
h1{
  font-size:2rem;color:#fc0;
  text-shadow:0 0 20px #fc04;
}
p{color:#ddd;font-size:.95rem;line-height:1.5}
.btn{
  display:inline-block;
  background:linear-gradient(135deg,#25a045,#1d7d36);
  color:#fff;padding:16px 44px;border-radius:16px;
  text-decoration:none;font-weight:bold;font-size:1.1rem;
  box-shadow:0 4px 0 #144,0 0 24px #25a04540;
  transition:transform .15s;
}
.btn:active{transform:scale(.95)}
ol{
  text-align:left;background:#14100a;border:1px solid #fc04;
  border-radius:14px;padding:20px 28px;max-width:320px;
  font-size:.85rem;line-height:2;
}
ol li{margin:2px 0;color:#ddd}
ol li b{color:#fc0}
.circle{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:6px}
.circle:nth-child(1){background:#ff6b6b}.circle:nth-child(2){background:#ffd93d}.circle:nth-child(3){background:#6bcb77}
</style></head><body>
<div class="bandeirinhas">🎊 🎉 🎊</div>
<h1>Festa Junina</h1>
<p>Baixe a moldura transparente<br>e use como sticker nos seus Stories</p>
<a class="btn" href="https://files.catbox.moe/thanug.png" download>Baixar Moldura</a>
<ol>
  <li><span class="circle"></span>Abra o <b>Instagram</b></li>
  <li><span class="circle"></span>Crie um Story com sua <b>foto</b></li>
  <li><span class="circle"></span>Toque em <b>Figurinhas</b></li>
  <li><span class="circle"></span>Toque em <b>Foto</b> e escolha a moldura</li>
  <li><span class="circle"></span><b>Posicione</b> e publique</li>
</ol>
<div class="bandeirinhas">🎊 🎉 🎊</div>
</body></html>
