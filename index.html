<!DOCTYPE html><html lang="pt"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no"><link rel="preload" as="image" href="output.png"><title>6ª Festa Junina R. Emiliano Manojo</title><style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:system-ui,-apple-system,sans-serif;
  background:#0a0400;
  color:#fff;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  min-height:100vh;text-align:center;padding:24px 20px;
  gap:14px;
}
/* BANDEIRINHAS */
.bandeiras{
  display:flex;gap:4px;margin-bottom:4px;
}
.bandeiras span{
  width:0;height:0;
  border-left:10px solid transparent;
  border-right:10px solid transparent;
  border-bottom:18px solid;
  animation:swing 3s ease-in-out infinite;
}
.bandeiras span:nth-child(1){border-bottom-color:#ff6b6b;animation-delay:0s}
.bandeiras span:nth-child(2){border-bottom-color:#ffd93d;animation-delay:.1s}
.bandeiras span:nth-child(3){border-bottom-color:#6bcb77;animation-delay:.2s}
.bandeiras span:nth-child(4){border-bottom-color:#4d96ff;animation-delay:.3s}
.bandeiras span:nth-child(5){border-bottom-color:#ff6b6b;animation-delay:.4s}
.bandeiras span:nth-child(6){border-bottom-color:#ffd93d;animation-delay:.5s}
.bandeiras span:nth-child(7){border-bottom-color:#cc4de0;animation-delay:.6s}
@keyframes swing{0%,100%{transform:rotate(-3deg)}50%{transform:rotate(3deg)}}

/* CHAPEU */
.chapeu{
  display:flex;flex-direction:column;align-items:center;opacity:.75;
}
.chapeu-copa{
  width:30px;height:18px;background:#c49a3c;
  border-radius:14px 14px 2px 2px;
}
.chapeu-fita{
  width:34px;height:3px;background:#ff6b6b;
  border-radius:1px;
}
.chapeu-aba{
  width:60px;height:6px;background:#a67c2a;
  border-radius:3px;
  margin-top:-1px;
}

/* TITULO */
h1{
  font-size:1.5rem;font-weight:900;
  text-align:center;line-height:1.3;
  max-width:340px;
}
h1 .edicao{
  display:block;
  font-size:.75rem;font-weight:500;
  color:#ffd93d;
  letter-spacing:5px;
  margin-bottom:2px;
}
h1 .festa{
  font-size:2rem;color:#fc0;
  text-shadow:0 2px 0 #a65e00;
}
h1 .rua{
  display:block;
  color:#bbb;font-weight:400;font-size:.75rem;
  letter-spacing:1px;margin-top:4px;
  font-style:italic;
}

.line{width:50px;height:2px;background:#fc0;opacity:.5;border-radius:1px}

.sub{color:#cdc;font-size:.85rem;line-height:1.5}

.preview img{
  width:110px;border-radius:14px;
  box-shadow:0 4px 20px #0008;
  border:2px solid #ffd93d22;
}

.btn{
  display:inline-block;
  background:#25a045;
  color:#fff;padding:14px 44px;border-radius:50px;
  text-decoration:none;font-weight:700;font-size:.98rem;
  letter-spacing:.5px;
  box-shadow:0 4px 0 #155c29;
  transition:transform .1s;
}
.btn:active{transform:scale(.96)}

.steps{
  text-align:left;
  background:#120c04;
  border:1px solid #fc03;
  border-radius:16px;padding:18px 26px;max-width:330px;
  font-size:.8rem;line-height:2.3;
}
.steps li{color:#ddd;list-style:none}
.steps li b{color:#fc0}
.steps li::before{
  content:'';display:inline-block;
  width:7px;height:7px;border-radius:50%;
  margin-right:10px;vertical-align:middle;
}
.steps li:nth-child(1)::before{background:#ff6b6b}
.steps li:nth-child(2)::before{background:#ffd93d}
.steps li:nth-child(3)::before{background:#6bcb77}
.steps li:nth-child(4)::before{background:#4d96ff}
.steps li:nth-child(5)::before{background:#cc4de0}

footer{
  opacity:.3;font-size:.68rem;letter-spacing:1px;
}
</style></head><body>

<div class="bandeiras">
  <span></span><span></span><span></span><span></span><span></span><span></span><span></span>
</div>

<div class="chapeu">
  <div class="chapeu-copa"></div>
  <div class="chapeu-fita"></div>
  <div class="chapeu-aba"></div>
</div>

<h1>
  <span class="edicao">6ª EDIÇÃO</span>
  <span class="festa">Festa Junina</span>
  <span class="rua">Rua Emiliano Manojo</span>
</h1>

<div class="line"></div>

<p class="sub">Baixe a moldura transparente<br>e use como sticker nos Stories</p>

<div class="preview"><img src="thumb.png" alt="Moldura"></div>

<a class="btn" href="output.png" download>BAIXAR MOLDURA</a>

<ol class="steps">
  <li>Abra o <b>Instagram</b></li>
  <li>Crie um Story com sua <b>foto</b></li>
  <li>Toque em <b>Figurinhas</b></li>
  <li>Toque em <b>Foto</b> e escolha a moldura</li>
  <li><b>Posicione</b> e publique</li>
</ol>

<footer>tinyurl.com/fj-mold</footer>

</body></html>
