<!DOCTYPE html><html lang="pt"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no"><title>Moldura Festa Junina</title><style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:system-ui,-apple-system,sans-serif;
  background:#0a0500;
  color:#fff;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  min-height:100vh;text-align:center;padding:32px 20px;
  position:relative;overflow:hidden;
  gap:22px;
}
body::before{
  content:'';position:absolute;top:0;left:0;width:100%;height:100%;
  background:
    radial-gradient(ellipse at 85% 15%,#fc03,0%,transparent 50%),
    radial-gradient(ellipse at 15% 85%,#f803,0%,transparent 50%),
    radial-gradient(ellipse at 50% 60%,#ff03,0%,transparent 60%);
  pointer-events:none;
}
.fita{
  width:100%;max-width:360px;height:80px;
  background:repeating-linear-gradient(45deg,#e62424,#e62424 12px,#c41c1c 12px,#c41c1c 24px);
  border-radius:4px;opacity:.9;
  position:relative;
  display:flex;align-items:center;justify-content:center;
}
.fita::before,.fita::after{
  content:'';position:absolute;bottom:-12px;
  width:0;height:0;
  border-left:14px solid transparent;
  border-right:14px solid transparent;
  border-top:14px solid #c41c1c;
}
.fita::before{left:24px}
.fita::after{right:24px}
.fita span{font-weight:bold;font-size:1.1rem;letter-spacing:2px;text-shadow:0 1px 2px #0006}
h1{margin-top:8px;font-size:2rem;color:#fc0;text-shadow:0 0 24px #fc04,0 0 48px #fc02}
.sub{color:#ddd;font-size:.9rem;line-height:1.5;opacity:.9}

.btn{
  display:inline-block;
  background:linear-gradient(180deg,#2cb84a,#1a8834);
  color:#fff;padding:15px 50px;border-radius:50px;
  text-decoration:none;font-weight:bold;font-size:1.05rem;
  letter-spacing:.5px;
  box-shadow:0 5px 0 #0f5c21,0 0 32px #2cb84a30;
  transition:transform .15s;
}
.btn:active{transform:scale(.95)}

.steps{
  text-align:left;background:linear-gradient(180deg,#1c140a,#120c04);
  border:1px solid #fc06;
  border-radius:16px;padding:22px 30px;max-width:340px;
  font-size:.84rem;line-height:2.2;
  box-shadow:0 0 20px #fc01;
}
.steps li{color:#eee;padding-left:4px}
.steps li b{color:#fc0}
.num{
  display:inline-block;
  width:20px;height:20px;line-height:20px;text-align:center;
  border-radius:50%;
  font-size:.7rem;font-weight:bold;
  margin-right:8px;
}
.num:nth-of-type(1){background:#ff6b6b}.num:nth-of-type(2){background:#ffd93d;color:#000}.num:nth-of-type(3){background:#6bcb77}.num:nth-of-type(4){background:#4d96ff}.num:nth-of-type(5){background:#cc4de0}

.dots{
  display:flex;gap:24px;opacity:.5;
  font-size:1.2rem;letter-spacing:4px;
}
.dots span{animation:pulse 2s ease-in-out infinite}
.dots span:nth-child(2){animation-delay:.3s}
.dots span:nth-child(3){animation-delay:.6s}
@keyframes pulse{0%,100%{opacity:.3}50%{opacity:1}}

.sep{width:80px;height:3px;background:linear-gradient(90deg,transparent,#fc0,transparent);border-radius:2px}
</style></head><body>

<div class="fita"><span>ARRAIÁ 2026</span></div>

<h1>Festa Junina</h1>

<div class="sep"></div>

<p class="sub">Baixe a moldura transparente<br>e use como sticker nos Stories</p>

<a class="btn" href="https://files.catbox.moe/thanug.png" download>BAIXAR MOLDURA</a>

<ol class="steps">
  <li><span class="num">1</span>Abra o <b>Instagram</b></li>
  <li><span class="num">2</span>Crie um Story com sua <b>foto</b></li>
  <li><span class="num">3</span>Toque em <b>Figurinhas</b></li>
  <li><span class="num">4</span>Toque em <b>Foto</b> e escolha a moldura</li>
  <li><span class="num">5</span><b>Posicione</b> e publique</li>
</ol>

<div class="dots">
  <span>•</span><span>•</span><span>•</span>
</div>

</body></html>
